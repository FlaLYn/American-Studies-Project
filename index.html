<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Money in America: The Archive</title>
  <link rel="stylesheet" href="styles.css?v=19">
</head>
<body>
  <main class="shell">
    <section class="hud">
      <div>
        <h1 id="placeTitle">Money in America: The Archive</h1>
        <p id="objective">Move to the Archivist and press E. Then touch the unlocked object to enter history.</p>
      </div>
      <div class="meters" aria-label="Player ledger">
        <div class="meter"><span>OPPORT.</span><div class="bar"><span class="fill" id="opFill"></span></div><strong id="opVal">0</strong></div>
        <div class="meter"><span>EQUITY</span><div class="bar"><span class="fill" id="eqFill"></span></div><strong id="eqVal">0</strong></div>
        <div class="meter"><span>STABLE</span><div class="bar"><span class="fill" id="stFill"></span></div><strong id="stVal">0</strong></div>
      </div>
    </section>

    <section class="game-wrap" id="gameWrap">
      <canvas id="game" width="640" height="480" aria-label="2D historical RPG game area"></canvas>
      <section class="dialogue" id="dialogue" aria-live="polite">
        <div class="speaker" id="speaker"></div>
        <div class="text" id="text"></div>
        <div class="choices" id="choices"></div>
      </section>
    </section>

    <section class="controls">
      <div><strong>Move:</strong> Arrow keys or WASD. <strong>Interact:</strong> E, Enter, or Space. <strong>Reset:</strong> R. <a href="LevelDesigner/level-editor.html">Open level editor</a></div>
      <div class="mobile-pad" aria-label="Mobile controls">
        <button type="button" data-dir="up">^</button>
        <button type="button" data-dir="left">&lt;</button>
        <button type="button" data-dir="down">v</button>
        <button type="button" data-dir="right">&gt;</button>
        <button type="button" data-action="interact">!</button>
      </div>
    </section>
  </main>

  <script src="game.js?v=19"></script>
</body>
</html>
